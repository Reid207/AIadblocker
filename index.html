<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>goober</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #fff;
    }

    .logo {
      font-size: 64px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .logo span:nth-child(1) { color: #4285F4; }
    .logo span:nth-child(2) { color: #EA4335; }
    .logo span:nth-child(3) { color: #FBBC05; }
    .logo span:nth-child(4) { color: #4285F4; }
    .logo span:nth-child(5) { color: #34A853; }
    .logo span:nth-child(6) { color: #EA4335; }

    .search-box {
      width: 500px;
      max-width: 90%;
      padding: 12px 20px;
      border-radius: 24px;
      border: 1px solid #ddd;
      font-size: 16px;
      outline: none;
    }

    .buttons {
      margin-top: 20px;
    }

    .buttons button {
      padding: 10px 16px;
      margin: 5px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #f8f9fa;
      cursor: pointer;
    }

    .buttons button:hover {
      border: 1px solid #aaa;
    }
  </style>
</head>
<body>

  <div class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
  </div>

  <input type="text" class="search-box" id="searchInput" placeholder="Search Google...">

  <div class="buttons">
    <button onclick="search()">Google Search</button>
    <button onclick="lucky()">I'm Feeling Lucky</button>
  </div>

  <script>
    function search() {
      const query = document.getElementById('searchInput').value;
      if(query) {
        window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
      }
    }

    function lucky() {
      const query = document.getElementById('searchInput').value;
      if(query) {
        window.location.href = 'https://www.google.com/search?btnI=1&q=' + encodeURIComponent(query);
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        search();
      }
    });
  </script>

</body>
</html>
