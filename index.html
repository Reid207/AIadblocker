<!DOCTYPE html>
<html>
<head>
  <title>Ad Blocker Control Panel</title>
  <style>
    html { scroll-behavior: smooth; }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #111, #000);
      color: #00ffcc;
      margin: 0;
      overflow-x: hidden;
    }

    canvas { position: fixed; top:0; left:0; z-index:0; }

    body.vip { filter: hue-rotate(30deg) saturate(1.5); }

    body.redmode {
      color: #ff3b3b;
      background: radial-gradient(circle at center, #200, #000);
    }

    /* RED MODE OVERRIDES */
    body.redmode .main-title { text-shadow: 0 0 25px #ff3b3b; }
    body.redmode .panel { box-shadow: 0 0 30px #ff3b3b; }
    body.redmode .stat-box { box-shadow: 0 0 10px #ff3b3b; }
    body.redmode .redbtn { box-shadow: 0 0 10px #ff3b3b; color:#ff3b3b; }
    body.redmode .settings { color:#ff3b3b; }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .main-title {
      font-size: 55px;
      margin-bottom: 20px;
      text-shadow: 0 0 25px #00ffcc;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #00ffcc; }
      to { text-shadow: 0 0 30px #00ffcc; }
    }

    .panel {
      background: rgba(20,20,20,0.9);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 30px #00ffcc;
      width: 320px;
      backdrop-filter: blur(10px);
    }

    .toggle {
      display:flex;
      justify-content:space-between;
      margin:15px 0;
    }

    .switch { position:relative; width:50px; height:25px; }
    .switch input { display:none; }

    .slider {
      position:absolute; width:100%; height:100%;
      background:#555; border-radius:25px; cursor:pointer;
    }

    .slider:before {
      content:"";
      position:absolute;
      height:20px; width:20px;
      left:3px; top:2.5px;
      background:white; border-radius:50%;
      transition:0.3s;
    }

    input:checked + .slider {
      background:#00ffcc;
      box-shadow:0 0 10px #00ffcc;
    }

    input:checked + .slider:before {
      transform: translateX(25px);
    }

    .status { text-align:center; margin-top:10px; color:#aaa; }

    .stats {
      margin-top:20px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .stat-box {
      background:#111;
      padding:10px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 0 10px #00ffcc;
    }

    .stat-number { font-size:20px; font-weight:bold; }

    .popup {
      position:fixed;
      background:#222;
      padding:15px;
      border-radius:10px;
      box-shadow:0 0 20px red;
      z-index:999;
      cursor:pointer;
    }

    .redbtn {
      position:fixed;
      top:10px;
      right:10px;
      z-index:10;
      padding:10px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#111;
      color:#00ffcc;
      box-shadow:0 0 10px #00ffcc;
    }

    .settings {
      position:fixed;
      top:10px;
      right:120px;
      z-index:10;
      font-size:22px;
      cursor:pointer;
    }

    .modal {
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:#111;
      padding:25px;
      border-radius:15px;
      box-shadow:0 0 30px #00ffcc;
      width:320px;
      display:none;
      z-index:9999;
    }

    .close {
      margin-top:10px;
      padding:8px;
      background:#00ffcc;
      border:none;
      cursor:pointer;
      border-radius:8px;
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="settings" onclick="openSettings()">⚙️</div>
<button class="redbtn" onclick="toggleRed()">Red Mode</button>

<div class="modal" id="modal">
  <h2>How this was made</h2>
  <p>
    This project was built using HTML, CSS and JavaScript. It simulates
    an ad blocker dashboard with animated popups and UI effects.
  </p>
  <button class="close" onclick="closeSettings()">Close</button>
</div>

<div class="container">
  <div class="main-title">Ad-Block Ultimate ⚡</div>

  <div class="panel">

    <div class="toggle">
      <span>🕶️ VIP Mode</span>
      <label class="switch">
        <input type="checkbox" id="vipToggle" onchange="toggleVIP()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle">
      <span>Block Ads</span>
      <label class="switch">
        <input type="checkbox" id="adToggle" onchange="updateStatus()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle">
      <span>Block Trackers</span>
      <label class="switch">
        <input type="checkbox" id="trackerToggle" onchange="updateStatus()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="status" id="status">No features enabled</div>

    <div class="stats">
      <div class="stat-box">
        Ads Blocked <div class="stat-number" id="adsBlocked">0</div>
      </div>
      <div class="stat-box">
        Trackers Blocked <div class="stat-number" id="trackersBlocked">0</div>
      </div>
    </div>
  </div>
</div>

<div class="footer">🚀 Created by Reid O'Brien</div>

<script>
const links=[
"https://www.youtube.com/watch?v=dQw4w9WgXcQ",
"https://www.youtube.com",
"https://www.wikipedia.org",
"https://www.google.com"
];

let adsBlocked=0;
let trackersBlocked=0;
let prevAd=false;
let prevTracker=false;
let redMode=false;

function toggleVIP(){
  document.body.classList.toggle("vip");
}

function openSettings(){ document.getElementById("modal").style.display="block"; }
function closeSettings(){ document.getElementById("modal").style.display="none"; }

function toggleRed(){
  redMode=!redMode;
  document.body.classList.toggle("redmode");
}

function explodePopups(){
  const popups=document.querySelectorAll(".popup");
  popups.forEach(p=>p.remove());
  return popups.length;
}

function updateStatus(){
  const ad=document.getElementById("adToggle").checked;
  const tracker=document.getElementById("trackerToggle").checked;

  if(ad && !prevAd){
    adsBlocked+=explodePopups();
    document.getElementById("adsBlocked").textContent=adsBlocked;
  }

  if(tracker && !prevTracker){
    trackersBlocked+=explodePopups();
    document.getElementById("trackersBlocked").textContent=trackersBlocked;
  }

  prevAd=ad;
  prevTracker=tracker;

  let enabled=[ad,tracker,document.getElementById("vipToggle").checked].filter(Boolean).length;

  document.getElementById("status").textContent=
    enabled===0?"No features enabled":enabled+" feature(s) enabled";

  if(!ad) startPopups();
  else stopPopups();
}

let interval;
function createPopup(){
  const p=document.createElement("div");
  p.className="popup";

  const msgs=["🚨 Free Robux for all click here","🔥 Bestest offer EVER 50% off!","💰 ALWAYS win click now!","⚡ click here to fix your P.C!","📦 Free gift click hair to redeem!","🎯 Lucky WINNER!"];
  p.textContent=msgs[Math.floor(Math.random()*msgs.length)];

  p.onclick=()=>window.open(links[Math.floor(Math.random()*links.length)],"_blank");

  p.style.left=Math.random()*window.innerWidth+"px";
  p.style.top=Math.random()*window.innerHeight+"px";

  document.body.appendChild(p);
}

function startPopups(){
  stopPopups();
  // FASTER SPAWN RATE 🔥
  interval=setInterval(()=>{
    if(!document.getElementById("adToggle").checked){
      createPopup();
    }
  },300);
}

function stopPopups(){
  clearInterval(interval);
  document.querySelectorAll(".popup").forEach(p=>p.remove());
}

const c=document.getElementById("bg");
const x=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;
let pts=[];
for(let i=0;i<60;i++) pts.push({x:Math.random()*c.width,y:Math.random()*c.height});

function anim(){
  const color=document.body.classList.contains("redmode")?"#ff3b3b":"#00ffcc";
  x.clearRect(0,0,c.width,c.height);
  pts.forEach(p=>{
    x.fillStyle=color;
    x.fillRect(p.x,p.y,2,2);
    p.x+=Math.random()-0.5;
    p.y+=Math.random()-0.5;
  });
  requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
