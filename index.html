<!DOCTYPE html>
<html>
<head>
  <title>Ad Blocker Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #00ffcc;
      display: flex;
      flex-direction: column; /* stack title + panel */
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* BIG TITLE */
    .main-title {
      font-size: 50px;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 0 0 15px #00ffcc;
    }

    .panel {
      position: relative;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px #00ffcc;
      width: 300px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .info-icon {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 22px;
      cursor: pointer;
    }

    .toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 15px 0;
    }

    .switch {
      position: relative;
      width: 50px;
      height: 25px;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background: #555;
      border-radius: 25px;
      width: 100%;
      height: 100%;
      transition: 0.3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      top: 2.5px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: #00ffcc;
    }

    input:checked + .slider:before {
      transform: translateX(25px);
    }

    .status {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      color: white;
      padding: 20px;
      border-radius: 10px;
      width: 260px;
      text-align: center;
      box-shadow: 0 0 15px #00ffcc;
    }

    .popup button {
      margin-top: 10px;
      padding: 5px 10px;
      border: none;
      background: #00ffcc;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <!-- BIG HEADER -->
  <div class="main-title">Ad-Block Ultimate</div>

  <div class="panel">
    <div class="info-icon" onclick="showInfo()">📄</div>

    <h2>Ad Blocker</h2>

    <div class="toggle">
      <span>V.I.P Mode</span>
      <label class="switch">
        <input type="checkbox" onchange="updateStatus()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle">
      <span>Block Ads</span>
      <label class="switch">
        <input type="checkbox" onchange="updateStatus()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle">
      <span>Block Trackers</span>
      <label class="switch">
        <input type="checkbox" onchange="updateStatus()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="status" id="status">
      No features enabled
    </div>
  </div>

  <div class="popup" id="popup">
    <h3>How it works</h3>
    <p>
      This is a demo ad blocker interface.<br><br>
      Real ad blockers use browser extensions to stop ads,
      trackers, and scripts from loading on websites.
    </p>
    <button onclick="closeInfo()">Close</button>
  </div>

  <script>
    function updateStatus() {
      const toggles = document.querySelectorAll("input[type=checkbox]");
      let enabled = 0;

      toggles.forEach(t => {
        if (t.checked) enabled++;
      });

      const status = document.getElementById("status");

      if (enabled === 0) {
        status.textContent = "No features enabled";
      } else {
        status.textContent = enabled + " feature(s) enabled";
      }
    }

    function showInfo() {
      document.getElementById("popup").style.display = "block";
    }

    function closeInfo() {
      document.getElementById("popup").style.display = "none";
    }
  </script>

</body>
</html>
